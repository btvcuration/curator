            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke={color}
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    {...props}
                >
                    {iconData.map((child, index) => {
                        const [tag, attrs] = child;
                        return React.createElement(tag, { ...attrs, key: index });
                    })}

            );

        // --- IndexedDB Helper Functions ---
        const DB_NAME = "AI_Curator_DB";
        const STORE_NAME = "titles";
        const DB_VERSION = 1;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject("IndexedDB open failed");
                request.onsuccess = (event) => resolve(event.target.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id" });
                    }
                };
            });
        };

        const saveToIndexedDB = async (data) => {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction([STORE_NAME], "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const item = { id: "full_dump", data: data, timestamp: new Date().getTime() };
                    const request = store.put(item);
                    request.onsuccess = () => resolve();
                    request.onerror = (e) => reject(e);
                });
            } catch (e) {
                console.error("IndexedDB Save Error:", e);
                throw e;
            }
        };

        const loadFromIndexedDB = async () => {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction([STORE_NAME], "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get("full_dump");
                    request.onsuccess = (event) => {
                        const result = event.target.result;
                        resolve(result ? result : null);
                    };
                    request.onerror = (e) => reject(e);
                });
            } catch (e) {
                console.error("IndexedDB Load Error:", e);
                return null;
            }
        };

        const clearIndexedDB = async () => {
             const db = await initDB();
             return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = (e) => reject(e);
            });
        }

        const calculateSimilarity = (s1, s2) => {
            const clean1 = String(s1).replace(/[^a-zA-Z0-9가-힣]/g, "").toLowerCase();
            const clean2 = String(s2).replace(/[^a-zA-Z0-9가-힣]/g, "").toLowerCase();
            if (clean1 === clean2) return 1.0; 
            if (clean1.includes(clean2) || clean2.includes(clean1)) {
                const ratio = Math.min(clean1.length, clean2.length) / Math.max(clean1.length, clean2.length);
                return 0.8 + (ratio * 0.2); 
            }
            return 0.0; 
        };

        const fetchRealWeather = async () => {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const res = await fetch('https://wttr.in/?format=j1', { signal: controller.signal });
                clearTimeout(timeoutId);
                const data = await res.json();
                const current = data.current_condition[0];
                const desc = current.weatherDesc[0].value.toLowerCase();
                let simplifiedDesc = "맑음";
                if (desc.includes('rain') || desc.includes('drizzle')) simplifiedDesc = "비";
                else if (desc.includes('snow') || desc.includes('ice')) simplifiedDesc = "눈";
                else if (desc.includes('cloud') || desc.includes('overcast')) simplifiedDesc = "흐림";
                else if (desc.includes('fog') || desc.includes('mist')) simplifiedDesc = "안개";
                return { temp: `${current.temp_C}°C`, weather: simplifiedDesc };
            } catch (e) {
                const seasonInfo = getSeasonalKeywords();
                return { temp: "", weather: seasonInfo.season, isFallback: true };
            }
        };

                    // 3. 무거운 영화 DB 데이터 로드 (여기는 로컬 캐시 적극 활용)
                    try {
                        const cached = await loadFromIndexedDB();

                        if (!loadedData) {
                            console.log("⬇️ 영화 DB 다운로드");
                            const res = await fetch(GAS_API_URL); // mode 파라미터 없으면 전체 로드

                            if (json.status === 'success' && json.data) {
                                loadedData = json.data;
                                await saveToIndexedDB(loadedData);
                            }
                        }

                        if (loadedData) setDbData(loadedData);

                    } catch (error) {
                        console.error("DB Load Error:", error);
                        setDbData([{id:"ERR", title:"데이터 로드 실패", category:"기타", subCategory:"기타", price:0}]);

                        setIsLoadingData(false);
                    }

                initApp();
            }, []);

                    await clearIndexedDB();
                    window.location.reload();
                } catch (e) {
                    console.error("Cache clear failed", e);
                    alert("캐시 초기화 중 오류가 발생했습니다.");
                }
            };

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(""), 3000);
            };

            const getDefaultDates = () => {
                const now = new Date();
                const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0); 
                const end = new Date("9999-12-31T23:59:59");
                const formatForInput = (d) => {
                    const pad = (n) => String(n).padStart(2, '0');
                    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
                };
                return { start: formatForInput(start), end: formatForInput(end) };
            };

            // [NEW] 모든 상태를 초기화하는 통합 함수
            const resetAllStates = () => {
                setQuery("");
                setViewState("idle");
                setResults([]);
                setOriginalResults([]);
                setSelectedItems(new Set());
                
                // 필터 상태들도 모두 초기화 (이게 핵심!)
                setSelectedGenres([]);
                setSelectedMetaTypes([]);
                setPriceType("all");
                setIncludeRestricted(false);
                setMinPrice(0);
                setOnlyBtvPlus(false);
            };

            const handleSearch = async (inputQuery) => {
                const targetQuery = inputQuery || query;
                if (!targetQuery) return;

                setQuery(targetQuery);
                setViewState("thinking");
                setIsSearching(true);
                setResults([]);
                
                // [수정] 검색 시작 시 원본 결과 초기화
                setOriginalResults([]); 
                setSelectedItems(new Set());

                const currentYear = new Date().getFullYear();
                const augmentedQuery = `${targetQuery} (${currentYear}년 ${context.weather} 날씨)`;
                const { start: defaultStart, end: defaultEnd } = getDefaultDates();

                try {
                    let aiResponse = { recommendedTitles: [], strategy: "", blockTitle: "" };

                    try {
                        const response = await fetch(`${GAS_API_URL}?query=${encodeURIComponent(augmentedQuery)}&weather=${encodeURIComponent(context.weather)}&mode=planning`);
                        if (response.ok) {
                            const json = await response.json();
                            aiResponse = json;
                        }
                    } catch (e) {
                        console.warn("AI Planning API Failed, using local heuristic");
                    }

                    const seasonalInfo = getSeasonalKeywords();
                    setStrategy(aiResponse.strategy || `☁️ ${context.weather} 날씨와 ${seasonalInfo.season} 시즌 감성을 담은 큐레이션`);
                    setBlockTitle(aiResponse.blockTitle || `[${seasonalInfo.season}] ${targetQuery} 추천 리스트`);

                    const rawRecs = aiResponse.recommendedTitles || [];
                    const normalizedRecs = rawRecs.map(r => ({
                        rawTitle: typeof r === 'string' ? r : r.title,
                        cleanTitle: String(typeof r === 'string' ? r : r.title).replace(/\(.*\)|\[.*\]/g, '').replace(/\s/g, '').toLowerCase(),
                        reason: r.reason || "AI 추천",
                        targetType: r.type ? r.type.toLowerCase() : (targetQuery.includes("정주행") || targetQuery.includes("드라마") ? "drama" : ""), 
                        keywords: r.keywords || []
                    }));
                    
                    const candidates = dbData.map(item => {
                        const rawTitle = item.title || "";
                        const titleForMatch = rawTitle.replace(/\(.*\)|\[.*\]/g, '').trim(); 
                        const myTitle = titleForMatch.replace(/\s/g, '').toLowerCase();
                        
                        const myCategory = (item.category || "").toLowerCase(); 
                        const mySubCategory = (item.subCategory || "").toLowerCase();
                        const myMetaType = (item.metaType || "").toLowerCase(); 

                        const isKids = myMetaType.includes("키즈") || myMetaType.includes("애니") ||
                                       myCategory.includes("키즈") || mySubCategory.includes("키즈") || 
                                       myCategory.includes("유아") || mySubCategory.includes("뽀로로") || 
                                       mySubCategory.includes("타요") || mySubCategory.includes("핑크퐁");
                        
                        const isDbMovie = myMetaType.includes("영화") || 
                                          myCategory.includes("영화") || myCategory.includes("movie") || 
                                          mySubCategory.includes("영화") || mySubCategory.includes("movie");

                        const isDbSeries = !isDbMovie && (
                            myMetaType.includes("시리즈") || myMetaType.includes("드라마") || myMetaType.includes("방송") ||
                            myCategory.includes("드라마") || myCategory.includes("시리즈") || myCategory.includes("예능") || myCategory.includes("tv") ||
                            myCategory.includes("지상파") || myCategory.includes("종편") || 
                            mySubCategory.includes("드라마") || mySubCategory.includes("시리즈") || mySubCategory.includes("예능") || mySubCategory.includes("tv")
                        );
                    
                        let score = 0;
                        let aiReason = "";
                        let aiTargetTitle = ""; 
                    
                        for (const rec of normalizedRecs) {
                            const recTitle = rec.cleanTitle;
                            const sim = calculateSimilarity(myTitle, recTitle);
                            
                            if (sim > 0.6) { 
                                let currentScore = sim * 100;
                                
                                const isRecSeries = rec.targetType.includes("drama") || rec.targetType.includes("series") || rec.targetType.includes("tv");
                                const isRecMovie = rec.targetType.includes("movie") || rec.targetType.includes("film");
                    
                                if (isKids) currentScore -= 3000; 

                                if (isRecSeries && isDbMovie) currentScore -= 2000; 
                                else if (isRecMovie && isDbSeries) currentScore -= 2000; 
                                else if ((isRecSeries && isDbSeries) || (isRecMovie && isDbMovie)) currentScore += 50; 

                                if (myTitle === recTitle) {
                                    currentScore += 500; 
                                } else if (myTitle.length > recTitle.length + 3) {
                                    currentScore -= 200; 
                                }
                                
                                if (currentScore > score) {
                                    score = currentScore;
                                    aiReason = rec.reason;
                                    aiTargetTitle = rec.rawTitle; 
                                }
                            }
                        }
                    
                        if (score > 0 && (myTitle.includes(targetQuery.replace(/\s/g, '')) || rawTitle.includes(targetQuery))) {
                            score += 30;
                        }
                    
                        return { 
                            ...item, 
                            score, 
                            aiReason, 
                            aiTargetTitle,
                            prices: [item.price], 
                            minPrice: item.price,
                            startDate: defaultStart,
                            endDate: defaultEnd
                        };
                    })
                    .filter(item => item.score > 40)
                    .sort((a, b) => b.score - a.score);
                    
                    const uniqueTitleMap = new Map();
                    
                    candidates.forEach(item => {
                        const dedupKey = item.title.replace(/\[.*?\]|\(.*?\)/g, "").replace(/\s/g, "").toLowerCase();

                        if (!uniqueTitleMap.has(dedupKey)) {
                            uniqueTitleMap.set(dedupKey, item);
                        } else {
                            const existing = uniqueTitleMap.get(dedupKey);
                            if (item.title.length < existing.title.length) {
                                uniqueTitleMap.set(dedupKey, item);
                            }
                        }
                    });
                    
                    const finalCandidates = Array.from(uniqueTitleMap.values()).slice(0, 50); 

                    // [수정] 검색 결과 원본 저장 (필터링 기준점)
                    setOriginalResults(finalCandidates);
                    
                    // [수정] 현재 필터가 켜져 있다면 즉시 필터링 적용, 아니면 전체 노출
                    if (hasActiveFilters) {
                        const filtered = finalCandidates.filter(item => {
                            if (!includeRestricted && (['성인', '기타', 'adult', 'etc'].some(c => item.category?.includes(c)))) return false;
                            if (selectedGenres.length > 0 && !selectedGenres.includes(item.subCategory)) return false;
                            if (selectedMetaTypes.length > 0 && !selectedMetaTypes.includes(item.metaType)) return false;
                            if (priceType === 'free' && item.price > 0) return false;
                            if (priceType === 'paid') {
                                if (item.price === 0) return false;
                                if (item.price < minPrice) return false;
                            }
                            return true;
                        });
                        setResults(filtered);
                    } else {
                        setResults(finalCandidates);
                    }

                    setViewState("result");

                } catch (e) {
                    console.error(e);
                    showToast("검색 중 오류가 발생했습니다.");
                    setViewState("idle");
                } finally {
                    setIsSearching(false);
                }
            };

            const applyFilters = (sourceData = originalResults) => {
                let filtered = sourceData.filter(item => {
                    if (!includeRestricted && ['성인', '기타', 'adult', 'etc'].includes(item.category)) return false;
                    if (selectedGenres.length > 0 && !selectedGenres.includes(item.category)) return false;
                    if (priceType === 'free' && item.minPrice > 0) return false;
                    if (priceType === 'paid') {
                        if (item.minPrice === 0) return false; 
                        if (item.minPrice < minPrice) return false; 
                    }
                    return true;
                });
                setResults(filtered);
            };

            // [최종 수정] 필터 적용 함수 (B tv + 포함 + 에러 코드 완전 제거 + 즉시 실행)
            const handleApplyFilterUI = () => {
                setShowFilters(false); // 팝업 닫기
                
                // 1. 필터링 로직 (로딩 없이 즉시 실행)
                try {
                    let sourceData = dbData; 
                    
                    // 검색어(query)가 있고 검색 결과가 있다면 그 안에서 필터링
                    if (query.trim() !== "" && Array.isArray(originalSearchResults) && originalSearchResults.length > 0) {
                        sourceData = originalSearchResults; 
                    }

                    const filtered = sourceData.filter(item => {
                        // [안전 장치] 변수 선언 (prod 포함!)
                        const cat = String(item.category || "");
                        const subCat = String(item.subCategory || "");
                        const meta = String(item.metaType || "");
                        const price = Number(item.price || 0);
                        const prod = String(item.products || ""); // [필수] 상품명 변수 선언

                        // 1. 성인/기타 제외
                        if (!includeRestricted) {
                            if (cat.includes('성인') || cat.includes('기타') || cat.includes('adult') || cat.includes('etc')) return false;
                        }
                        
                        // 2. 장르 필터
                        if (selectedGenres.length > 0) {
                            const isMatch = selectedGenres.some(g => cat.includes(g) || subCat.includes(g));
                            if (!isMatch) return false;
                        }
                        
                        // 3. 메타 유형 필터
                        if (selectedMetaTypes.length > 0) {
                            const isMatch = selectedMetaTypes.some(t => meta.includes(t));
                            if (!isMatch) return false;
                        }
                        
                        // 4. 가격 필터
                        if (priceType === 'free' && price > 0) return false;
                        if (priceType === 'paid') {
                            if (price === 0) return false;
                            if (price < minPrice) return false;
                        }

                        // 5. [NEW] B tv + 필터 (prod 변수 사용)
                        if (onlyBtvPlus) {
                            if (!prod.includes("B tv+")) return false;
                        }

                        return true;
                    });

                    // 2. 결과 반영
                    setResults(filtered);
                    
                    // 3. 결과 메시지
                    if (filtered.length === 0) {
                        showToast("조건에 맞는 콘텐츠가 없습니다.");
                    } else {
                        showToast(`필터 적용 완료 (${filtered.length.toLocaleString()}건)`);
                    }

                } catch (error) {
                    console.error("Filter Logic Error:", error);
                    showToast("필터 처리 중 오류가 발생했습니다.");
                }
            };

            const toggleSelection = (id) => {
                const newSet = new Set(selectedItems);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedItems(newSet);
            };

            const toggleAllSelection = () => {
                if (selectedItems.size === results.length) {
                    setSelectedItems(new Set());
                } else {
                    setSelectedItems(new Set(results.map(r => r.id)));
                }
            };

            const handleDateChange = (id, field, value) => {
                setResults(prev => prev.map(item => 
                    item.id === id ? { ...item, [field]: value } : item
                ));
            };

            const openBulkEditModal = () => {
                if (selectedItems.size === 0) {
                    showToast("선택된 항목이 없습니다.");
                    return;
                }
                const { start, end } = getDefaultDates();
                setBulkStartDate(start);
                setBulkEndDate(end);
                setShowDateModal(true);
            };

            const applyBulkDateEdit = () => {
                setResults(prev => prev.map(item => {
                    if (selectedItems.has(item.id)) {
                        return {
                            ...item,
                            startDate: bulkStartDate || item.startDate,
                            endDate: bulkEndDate || item.endDate
                        };
                    }
                    return item;
                }));
                setShowDateModal(false);
                showToast(`${selectedItems.size}건 날짜 수정 완료`);
            };

            const removeItem = (id) => {
                setResults(prev => prev.filter(item => item.id !== id));
                const newSet = new Set(selectedItems);
                newSet.delete(id);
                setSelectedItems(newSet);
            };

            const onDragStart = (e, index) => {
                dragItem.current = index;
            };

            const onDragEnter = (e, index) => {
                dragOverItem.current = index;
            };

            const onDragEnd = (e) => {
                const _results = [...results];
                const dragItemContent = _results[dragItem.current];
                _results.splice(dragItem.current, 1);
                _results.splice(dragOverItem.current, 0, dragItemContent);
                dragItem.current = null;
                dragOverItem.current = null;
                setResults(_results);
            };

            const onDragOver = (e) => {
                e.preventDefault(); 
            };

            const copyToClipboard = () => {
                const body = results.map(r => r.id).join('\n');
                const textArea = document.createElement("textarea");
                textArea.value = body;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                showToast(`ID ${results.length}건 복사 완료`);
                setTimeout(() => setCopied(false), 2000);
            };

            const downloadExcel = () => {
                const formatForCSV = (isoStr) => {
                    return isoStr.replace("T", " ") + ":00";
                };
                let csvContent = "시리즈ID,편성시작일시,편성종료일시\n";
                results.forEach(r => {
                    const safeId = String(r.id).replace(/,/g, ""); 
                    const start = formatForCSV(r.startDate);
                    const end = formatForCSV(r.endDate);
                    csvContent += `${safeId},${start},${end}\n`;
                });
                const BOM = '\uFEFF';
                const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', `편성업로드_${new Date().toISOString().slice(0,10)}_${query}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const getWeatherIcon = (weatherStr) => {
                if (!weatherStr) return <Sun size={12} />;
                const w = String(weatherStr).toLowerCase();
                if (w.includes('snow') || w.includes('눈') || w.includes('추움')) return <CloudSnow size={12} />;
                if (w.includes('rain') || w.includes('비')) return <CloudRain size={12} />;
                if (w.includes('cloud') || w.includes('흐림') || w.includes('구름') || w.includes('안개')) return <Cloud size={12} />;
                return <Sun size={12} />;
            };

            // ---------------- UI RENDER ----------------

            if (isLoadingData) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-center font-sans">
                        <div className="bg-white p-8 rounded-3xl shadow-xl flex flex-col items-center max-w-sm w-full border border-slate-100 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-purple-500 animate-pulse"></div>
                            <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-6 animate-bounce">
                                <Sparkles size={32} className="text-blue-600" />
                            </div>
                            <h2 className="text-xl font-bold text-slate-800 mb-4 transition-all duration-500 min-h-[3rem] flex items-center justify-center break-keep">
                                {LOADING_MESSAGES[loadingMsgIndex]}
                            </h2>
                            <div className="flex items-center gap-2 text-xs font-bold text-gray-400 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100">
                                <Database size={12} />
                                <span>데이터 동기화 및 트렌드 분석 중...</span>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans w-full px-4 md:px-8 lg:px-12 py-6 overflow-x-hidden transition-all duration-300">
                    
                    {toastMessage && (
                        <div className="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 text-sm font-bold animate-fade-in flex items-center gap-2 whitespace-nowrap">
                            <CheckCircle2 size={18} className="text-green-400" />
                            {toastMessage}
                        </div>
                    )}

                    {/* 헤더 영역 */}
                    <header className="bg-white rounded-3xl px-6 py-4 mb-4 shadow-sm border border-gray-100 sticky top-4 z-40">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            {/* 1. 로고 영역: 모바일에서도 텍스트 보이게 수정 */}
                            <div className="flex items-center gap-3 shrink-0" onClick={resetAllStates}>
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white cursor-pointer shadow-blue-200 shadow-md hover:scale-105 transition-transform">
                                    <Sparkles size={20} fill="currentColor" />
                                </div>
                                <div className="block"> 
                                    <h1 className="font-bold text-xl tracking-tight cursor-pointer leading-none">AI Curator</h1>
                                    <span className="text-[10px] text-gray-400 font-medium ml-0.5">Smart Admin System</span>
                                </div>
                            </div>

                            {/* 2. 검색창 영역 */}
                            <div className="flex-1 max-w-2xl w-full mx-auto">
                                <SearchBar 
                                    query={query} 
                                    setQuery={setQuery} 
                                    handleSearch={handleSearch} 
                                    setShowFilters={setShowFilters} 
                                    hasFilters={hasActiveFilters} 
                                    compact={true} 
                                />
                            </div>
                            
                            {/* 3. 우측 컨트롤 영역 */}
                            <div className="flex items-center justify-end gap-2 sm:gap-3 shrink-0">
                                {/* 날씨 뱃지: 모바일에서도 온도 보이게 수정 */}
                                <div className="flex items-center gap-1.5 px-3 py-2 bg-sky-50 text-sky-700 rounded-xl text-xs font-bold border border-sky-100 whitespace-nowrap">
                                    {getWeatherIcon(context.weather)} 
                                    <span>{context.temp}</span> {/* hidden 클래스 제거됨 */}
                                </div>

                                {/* [수정] 데이터 재설정 버튼: 텍스트 명시 & 붉은색 */}
                                <button 
                                    onClick={clearCache} 
                                    className="flex items-center gap-1.5 px-3 py-2 bg-rose-50 border border-rose-100 rounded-xl text-rose-600 hover:bg-rose-100 hover:text-rose-700 transition-colors" 
                                    title="로컬/서버 데이터 강제 초기화"
                                >
                                    <RotateCcw size={14} />
                                    <span className="text-xs font-bold hidden sm:inline-block">데이터 재설정</span>
                                </button>
                                
                                <div className="hidden sm:flex items-center gap-1.5 bg-green-50 px-3 py-2 rounded-xl border border-green-100">
                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    <span className="text-xs font-bold text-green-700 tracking-tight flex items-center gap-1">
                                        <FileSpreadsheet size={14} className="text-green-600"/>
                                        {dbData.length.toLocaleString()}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="pb-32 min-h-[60vh]">
                        {viewState === "idle" && (
                            <div className="flex flex-col animate-fade-in w-full">
                                
                                {/* [복구 완료] 사라졌던 헤더 영역 (제목 + 새로고침 버튼 + 뱃지) */}
                                <div className="w-full max-w-[1600px] mx-auto mt-10"> 
                                    <div className="flex items-center justify-between px-2 mb-4 flex-col sm:flex-row items-start sm:items-center gap-3">
                                        <div className="flex items-center gap-3">
                                            <h3 className="text-lg font-extrabold text-gray-900 tracking-tight">Today's Trend Pick</h3>
                                            <button 
                                                onClick={handleTrendRefresh} disabled={isTrendRefreshing}
                                                className="p-2 rounded-full bg-white border border-gray-200 hover:border-indigo-300 hover:text-indigo-600 shadow-sm transition-all active:scale-95 group"
                                                title="최신 트렌드로 업데이트"
                                            >
                                                <RotateCcw size={14} className={`text-gray-400 group-hover:text-indigo-600 ${isTrendRefreshing ? "animate-spin" : ""}`} />
                                            </button>
                                        </div>
                                    
                                        {/* [NEW] 탭 메뉴 영역 */}
                                        <div className="flex bg-gray-100 p-1 rounded-xl w-full sm:w-auto overflow-x-auto scrollbar-hide shrink-0">
                                            <button 
                                                onClick={() => setActiveTab('person')}
                                                className={`flex-1 sm:flex-none px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap transition-all ${activeTab === 'person' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                            >🌟 인물 픽</button>
                                            <button 
                                                onClick={() => setActiveTab('viral')}
                                                className={`flex-1 sm:flex-none px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap transition-all ${activeTab === 'viral' ? 'bg-white text-orange-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                            >🔥 화제성 픽</button>
                                            <button 
                                                onClick={() => setActiveTab('onair')}
                                                className={`flex-1 sm:flex-none px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap transition-all ${activeTab === 'onair' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                            >📺 라이브 픽</button>
                                            <button 
                                                onClick={() => setActiveTab('tpo')}
                                                className={`flex-1 sm:flex-none px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap transition-all ${activeTab === 'tpo' ? 'bg-white text-emerald-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                            >☁️ 상황 감성</button>

                                                ))}
                                            </div>
                                            
                                            {priceType === 'paid' && (
                                                <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200 animate-fade-in mt-3 space-y-3">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-xs font-bold text-gray-500">최소 가격</span>
                                                        <span className="text-base font-bold text-blue-600 bg-white px-2 py-1 rounded border border-blue-100">{minPrice.toLocaleString()}원 이상</span>
                                                    </div>
                                                    <input 
                                                        type="range" 
                                                        min="0" 
                                                        max="20000" 
                                                        step="500" 
                                                        value={minPrice} 
                                                        onChange={(e) => setMinPrice(Number(e.target.value))}
                                                        className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                                    />
                                                    <div className="flex justify-between text-[10px] text-gray-400 font-medium">
                                                        <span>0원</span>
                                                        <span>20,000원+</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <button 
                                        onClick={handleApplyFilterUI}
                                        className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-lg hover:bg-slate-800 transition-colors shadow-xl"
                                    >
                                        필터 적용하기
                                    </button>
                                </div>
                           </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
